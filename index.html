<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Providence Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0b;
    --dark1: #111214;
    --dark2: #18191d;
    --dark3: #1f2127;
    --border: #2c2e36;
    --border2: #383b46;
    --gold: #e8a820;
    --gold2: #f5c842;
    --gold-dim: rgba(232,168,32,0.15);
    --gold-border: rgba(232,168,32,0.3);
    --blue: #4ca8d4;
    --green: #4dbf7f;
    --red: #e05454;
    --amber: #e87c28;
    --text: #dde0ea;
    --text2: #9499aa;
    --text3: #5c6070;
    --mono: 'Barlow Condensed', sans-serif;
    --sans: 'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--dark1);
    border-bottom: 2px solid var(--gold);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 58px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-right: 16px;
    border-right: 1px solid var(--border2);
  }

  .logo-img {
    height: 38px;
    width: 38px;
    object-fit: contain;
    filter: invert(1) sepia(1) saturate(3) hue-rotate(0deg) brightness(0.9);
  }

  .logo-text {
    font-family: var(--mono);
    font-weight: 800;
    font-size: 17px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    line-height: 1;
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin-top: 2px;
  }

  .driver-tabs {
    display: flex;
    gap: 4px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .driver-tabs::-webkit-scrollbar { display: none; }

  .driver-tab {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
    position: relative;
  }

  .driver-tab:hover { border-color: var(--gold); color: var(--gold); }
  .driver-tab.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
    font-weight: 800;
  }

  .tab-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: var(--green);
    border-radius: 0 0 3px 3px;
    transition: width 0.3s ease;
  }

  .header-stats {
    display: flex;
    gap: 16px;
    align-items: center;
    padding-left: 12px;
    border-left: 1px solid var(--border2);
    white-space: nowrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 1px;
  }

  .stat-val {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-lbl {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 58px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--dark1);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    height: calc(100vh - 58px);
    position: sticky;
    top: 58px;
  }

  .sidebar-hdr {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-hdr-lbl {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .sidebar-hdr-count {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
  }

  .stop-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
    border-left: 3px solid transparent;
  }

  .stop-item:hover { background: var(--dark2); }

  .stop-item.active {
    background: var(--dark3);
    border-left-color: var(--gold);
  }

  .stop-item.done {
    opacity: 0.38;
  }

  .stop-item-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 4px;
  }

  .stop-num {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--gold);
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .stop-shipper {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text);
    line-height: 1.25;
    text-transform: uppercase;
  }

  .order-count {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .order-count.single { background: var(--dark3); color: var(--text3); border: 1px solid var(--border2); }
  .order-count.multi { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold-border); }

  .stop-addr {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 5px;
  }

  .stop-wt {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
  }

  .stop-chips {
    display: flex;
    gap: 4px;
    margin-top: 5px;
    flex-wrap: wrap;
  }

  .chip {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
  }

  .chip-frozen { background: rgba(76,168,212,0.12); color: var(--blue); border: 1px solid rgba(76,168,212,0.25); }
  .chip-cold { background: rgba(77,191,127,0.1); color: var(--green); border: 1px solid rgba(77,191,127,0.2); }
  .chip-dry { background: rgba(232,168,32,0.1); color: var(--gold); border: 1px solid rgba(232,168,32,0.2); }
  .chip-appt { background: rgba(232,168,32,0.08); color: var(--gold2); border: 1px solid rgba(232,168,32,0.15); }
  .chip-warn { background: rgba(232,124,40,0.1); color: var(--amber); border: 1px solid rgba(232,124,40,0.2); }

  /* ── MAIN PANEL ── */
  .main {
    padding: 24px 28px;
    overflow-y: auto;
    min-height: calc(100vh - 58px);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 55vh;
    gap: 14px;
  }

  .empty-logo {
    width: 80px;
    opacity: 0.12;
    filter: invert(1);
  }

  .empty-txt {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
  }

  /* ── DETAIL ── */
  .prog-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 22px;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .detail-hdr {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .detail-stopnum {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .detail-title {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1.1;
  }

  .detail-addr {
    font-size: 12px;
    color: var(--text3);
    margin-top: 6px;
    font-family: var(--mono);
    letter-spacing: 0.04em;
  }

  .detail-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
    transition: all 0.12s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .btn-nav { background: var(--dark3); color: var(--blue); border: 1px solid rgba(76,168,212,0.3); }
  .btn-nav:hover { background: rgba(76,168,212,0.12); border-color: var(--blue); }
  .btn-call { background: var(--dark3); color: var(--green); border: 1px solid rgba(77,191,127,0.25); }
  .btn-call:hover { background: rgba(77,191,127,0.1); border-color: var(--green); }
  .btn-done { background: var(--gold); color: #000; }
  .btn-done:hover { background: var(--gold2); }
  .btn-undone { background: var(--dark3); color: var(--text3); border: 1px solid var(--border2); }
  .btn-undone:hover { border-color: var(--gold); color: var(--gold); }

  /* alert banner */
  .alert-banner {
    padding: 11px 16px;
    border-radius: 3px;
    margin-bottom: 18px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .alert-warn { background: rgba(232,124,40,0.08); border: 1px solid rgba(232,124,40,0.25); color: var(--amber); }

  /* summary bar */
  .summary-bar {
    display: flex;
    gap: 0;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 22px;
    overflow: hidden;
  }

  .sum-item {
    padding: 12px 18px;
    border-right: 1px solid var(--border);
    flex: 1;
    min-width: 0;
  }

  .sum-item:last-child { border-right: none; }

  .sum-lbl {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 3px;
  }

  .sum-val {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* phone block */
  .phone-block {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 22px;
  }

  .phone-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); margin-bottom: 2px; }
  .phone-num { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--blue); }

  /* appt block */
  .appt-block {
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    border-radius: 4px;
    padding: 10px 16px;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--gold2);
  }

  /* section label */
  .section-lbl {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* orders */
  .orders-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 30px; }

  .order-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 14px;
    align-items: start;
  }

  .order-card:hover { border-color: var(--border2); }

  .order-customer { font-family: var(--mono); font-size: 14px; font-weight: 700; text-transform: uppercase; color: var(--text); margin-bottom: 3px; letter-spacing: 0.03em; }

  .order-consignee { font-size: 12px; color: var(--text2); margin-bottom: 6px; }

  .order-dest { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-bottom: 8px; letter-spacing: 0.04em; }

  .order-meta { display: flex; gap: 16px; flex-wrap: wrap; }

  .meta-field { display: flex; flex-direction: column; gap: 2px; }
  .meta-lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
  .meta-val { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--text2); }

  .order-right { text-align: right; }
  .order-wt { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--text); }
  .order-pl { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 2px; }

  .order-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── MODAL (mobile stop detail popup) ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal-sheet {
    background: var(--dark1);
    border-radius: 12px 12px 0 0;
    border-top: 2px solid var(--gold);
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border2);
    border-radius: 2px;
    margin: 12px auto 0;
  }

  .modal-inner {
    padding: 16px 18px 24px;
  }

  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
  }

  @media (max-width: 680px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { height: auto; position: static; border-right: none; }
    .main { display: none; } /* hidden on mobile — detail shown in modal */
    header { flex-wrap: wrap; height: auto; padding: 10px 12px; gap: 8px; }
    .header-stats { display: none; }
    .logo-text { font-size: 15px; }
    .logo-sub { font-size: 9px; }
    .logo-img { height: 32px; width: 32px; }
    .driver-tabs { gap: 3px; }
    .driver-tab { font-size: 11px; padding: 5px 10px; }
    .stop-item { padding: 14px 14px; }
    .stop-shipper { font-size: 15px; }
    .stop-addr { font-size: 12px; }
    .stop-wt { font-size: 12px; }
    .stop-num { font-size: 11px; }
    .order-count { font-size: 11px; }
    /* make stop list taller and touch-friendly */
    .sidebar { min-height: calc(100vh - 80px); }
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img class="logo-img" id="logoImg" alt="Providence Freight Solutions">
    <div>
      <div class="logo-text">Providence</div>
      <div class="logo-sub">Dispatch</div>
    </div>
  </div>
  <div class="driver-tabs" id="driverTabs"></div>
  <div class="header-stats" id="headerStats"></div>
</header>

<!-- ── MOBILE MODAL ── -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕ CLOSE</button>
    <div class="modal-inner" id="modalInner"></div>
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-hdr">
      <span class="sidebar-hdr-lbl">Stops</span>
      <span class="sidebar-hdr-count" id="stopCount"></span>
    </div>
    <div id="stopList"></div>
  </aside>
  <main class="main" id="mainPanel">
    <div class="empty-state">
      <img class="empty-logo" id="emptyLogo" alt="">
      <div class="empty-txt">Select a stop to view details</div>
    </div>
  </main>
</div>

<script>

// ── CONFIG ──
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR76UlgWFXKhCHftEMGkqRP_ILPCqLCy7cnZWW_8XbCtlKde0UtcD1BlJFjkRYkZCi/exec';

// ── DRIVER CONFIG ──
const DRIVERS = [
  {id:"johnny",    name:"Johnny",     range:[1,  20]},
  {id:"mike",      name:"Mike",       range:[21, 40]},
  {id:"newdriver", name:"New Driver", range:[41, 60]},
  {id:"chentos",   name:"Chentos",    range:[61, 80]},
  {id:"chn",       name:"CHN",        range:[81, 100]},
  {id:"john",      name:"John",       range:[101,130]},
];

// ── STATE ──
let RAW = [];
let activeDriver = "johnny";
let activeKey = null;
let done = {}; // { "STOP 01": true, ... } — synced across all users via Google Sheet

// ── POLLING (every 30s) ──
let pollInterval = null;
let lastDataHash = '';

function hashData(json) {
  // Quick fingerprint of the data to detect any change
  return JSON.stringify(json.map(r => ({
    s: r['STOP'], w: r['WEIGHT'], p: r['PICKED'],
    a: r['APPOINTMENT INFO'], ph: r['PHONE NUMBER']
  })));
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    try {
      const resp = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now()); // cache-bust
      if (!resp.ok) return;
      const json = await resp.json();
      if (!Array.isArray(json) || !json.length) return;

      const newHash = hashData(json);
      if (newHash === lastDataHash) return; // nothing changed
      lastDataHash = newHash;

      const parsed = json.map(rowToStop).filter(Boolean);
      if (!parsed.length) return;

      const prevRAW = RAW;
      RAW = parsed;
      syncDone(json);
      renderHeader();
      renderSidebar();

      if (activeKey) {
        const prevGroup = getGroupFromRAW(prevRAW, activeKey);
        const newGroup = getStopsForDriver(activeDriver).find(x => gKey(x) === activeKey);
        const changed = prevGroup && newGroup &&
          JSON.stringify(prevGroup.orders) !== JSON.stringify(newGroup.orders);

        if (isMobile()) {
          const overlay = document.getElementById('modalOverlay');
          const inner = document.getElementById('modalInner');
          if (overlay.classList.contains('open') && inner) {
            inner.innerHTML = buildDetailHTML(activeKey, true);
          }
        } else {
          renderDetail(activeKey);
        }

        if (changed) showUpdateToast();
      }
    } catch(e) { /* silent poll failure */ }
  }, 30000);
}

function getGroupFromRAW(rawData, key) {
  // Rebuild groups from a given RAW snapshot for comparison
  const d = DRIVERS.find(x => x.id === activeDriver);
  if (!d) return null;
  const rows = rawData.filter(r => r.stop >= d.range[0] && r.stop <= d.range[1]);
  const byAddr = {};
  rows.forEach(r => {
    const k = r.address.trim().toLowerCase().replace(/\s+/g,' ');
    if (!byAddr[k]) byAddr[k] = {orders:[]};
    byAddr[k].orders.push(r);
  });
  return byAddr[key] || null;
}

function showUpdateToast() {
  // Remove any existing toast
  const existing = document.getElementById('update-toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.id = 'update-toast';
  toast.innerHTML = '↻ Stop details updated';
  toast.style.cssText = `
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--gold); color: #000;
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 10px 20px; border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 999; opacity: 0;
    transition: opacity 0.3s ease;
  `;
  document.body.appendChild(toast);
  requestAnimationFrame(() => { toast.style.opacity = '1'; });
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function syncDone(json) {
  done = {};
  json.forEach(r => {
    const stop = (r['STOP'] || '').trim();
    const picked = (r['PICKED'] || '').trim().toUpperCase();
    if (stop && picked === 'DONE') done[stop] = true;
  });
}

// ── WRITE DONE STATUS BACK TO SHEET ──
async function setDoneOnSheet(stopVal, isDoneVal) {
  try {
    const url = APPS_SCRIPT_URL + '?action=setDone&stop=' + encodeURIComponent(stopVal) + '&done=' + isDoneVal;
    await fetch(url);
  } catch(e) {
    console.error('setDone error:', e);
  }
}

// ── PARSE ROW → stop object ──
// Exact headers from PICKUPS sheet:
// STOP | ADDRESS | PHONE NUMBER | CUSTOMER | SHIPPER | PICKUP DATE & TIME |
// CONSIGNEE NAME | DELIVERTY CITY | DELIVERY ST | PO#  | BOL # | SHIP REF |
// WEIGHT | PL | APPOINTMENT INFO | PICKED
function rowToStop(r) {
  const get = (...keys) => {
    for (const k of keys) {
      if (r[k] !== undefined && r[k] !== null && String(r[k]).trim() !== '') {
        return String(r[k]).trim();
      }
    }
    return '';
  };

  const stopVal = get('STOP');
  if (!stopVal || stopVal.toUpperCase() === 'X') return null;
  const stopMatch = stopVal.match(/\d+/);
  if (!stopMatch) return null;
  const stopNum = parseInt(stopMatch[0]);

  const shipper = get('SHIPPER');
  if (!shipper) return null;

  const wRaw = get('WEIGHT').replace(/,/g,'');
  const weight = parseFloat(wRaw) || 0;
  const pl = parseFloat(get('PL')) || 0;

  // Use raw datetime string exactly as it appears in the sheet — no timezone conversion
  let pickupDateTime = '';
  const pdRaw = get('PICKUP DATE & TIME');
  if (pdRaw) {
    // Try to reformat "5/5/2026 6:00:00" → "5/5 6:00 AM" without any Date() conversion
    const match = pdRaw.match(/^(\d+\/\d+)(?:\/\d+)?(?:\s+(\d+):(\d+)(?::\d+)?)?/);
    if (match) {
      const datePart = match[1]; // "5/5"
      const hStr = match[2];
      const mStr = match[3];
      if (hStr !== undefined) {
        const h = parseInt(hStr);
        const m = parseInt(mStr);
        if (h === 0 && m === 0) {
          pickupDateTime = datePart;
        } else {
          const ampm = h >= 12 ? 'PM' : 'AM';
          const h12 = h % 12 || 12;
          const mPad = m > 0 ? ':' + String(m).padStart(2,'0') : '';
          pickupDateTime = datePart + ' ' + h12 + mPad + ' ' + ampm;
        }
      } else {
        pickupDateTime = datePart;
      }
    } else {
      pickupDateTime = pdRaw;
    }
  }

  return {
    stop: stopNum,
    stopVal: stopVal,  // original e.g. "STOP 01"
    shipper: shipper,
    address: get('ADDRESS'),
    phone: get('PHONE NUMBER'),
    customer: get('CUSTOMER'),
    consignee: get('CONSIGNEE NAME'),
    delCity: get('DELIVERTY CITY'),
    delSt: get('DELIVERY ST'),
    weight: weight,
    pl: pl,
    pickupDateTime: pickupDateTime,
    po: get('PO# ', 'PO #', 'PO#'),
    bol: get('BOL #'),
    shipRef: get('SHIP REF'),
    appt: get('APPOINTMENT INFO'),
  };
}

// ── HELPERS ──
function getStopsForDriver(id) {
  const d = DRIVERS.find(x => x.id === id);
  if (!d) return [];
  const rows = RAW.filter(r => r.stop >= d.range[0] && r.stop <= d.range[1]);
  const byAddr = {};
  rows.forEach(r => {
    const key = r.address.trim().toLowerCase().replace(/\s+/g,' ');
    if (!byAddr[key]) byAddr[key] = {address:r.address, phone:r.phone, shipper:r.shipper, orders:[], firstStop:r.stop};
    const g = byAddr[key];
    g.orders.push(r);
    if (r.stop < g.firstStop) { g.firstStop = r.stop; g.shipper = r.shipper; g.phone = r.phone || g.phone; }
  });
  return Object.values(byAddr).sort((a,b) => a.firstStop - b.firstStop);
}

function gKey(g) { return g.address.trim().toLowerCase().replace(/\s+/g,' '); }

function isDone(g) {
  return g.orders.some(o => !!done[o.stopVal]);
}

function stopLabel(orders) {
  const nums = [...new Set(orders.map(o=>o.stop))].sort((a,b)=>a-b);
  const lbl = n => String(n).padStart(2,'0');
  return nums.length === 1 ? `STOP ${lbl(nums[0])}` : `STOPS ${nums[0]}–${nums[nums.length-1]}`;
}

function fmtW(w) { return w > 0 ? w.toLocaleString() + ' lbs' : '—'; }
function fmtPL(p) { return p > 0 ? p + ' PLT' : '—'; }

function getTempClass(o) {
  const s = (o.bol + ' ' + o.appt).toUpperCase();
  if (s.includes('FROZEN')) return 'frozen';
  if (s.includes('COLD') || s.includes('CHILL')) return 'cold';
  if (s.includes('DRY')) return 'dry';
  return '';
}

function hasApptInfo(orders) {
  const skip = ['CONF RDY','NEED','OK','CONF','REQ',''];
  return orders.some(o => o.appt && !skip.includes(o.appt.toUpperCase().trim()));
}

function chip(cls, label) { return `<span class="chip chip-${cls}">${label}</span>`; }

// ── RENDER SIDEBAR ──
function renderSidebar() {
  const groups = getStopsForDriver(activeDriver);
  const html = groups.map(g => {
    const key = gKey(g);
    const active = activeKey === key;
    const d = isDone(g);
    const multi = g.orders.length > 1;
    const totalW = g.orders.reduce((s,o)=>s+(o.weight||0),0);
    const totalPL = g.orders.reduce((s,o)=>s+(o.pl||0),0);
    const temps = [...new Set(g.orders.map(getTempClass).filter(Boolean))];
    const apptFlag = hasApptInfo(g.orders);
    const warnFlag = g.orders.some(o => (o.appt||'').toUpperCase().includes('CANCEL'));

    let chips = '';
    temps.forEach(t => { chips += chip(t, t); });
    if (apptFlag) chips += chip('appt', 'APPT');
    if (warnFlag) chips += chip('warn', '⚠ WARNING');

    const addrShort = g.address.split(',').slice(-1)[0].trim() || g.address;

    return `<div class="stop-item${active?' active':''}${d?' done':''}" onclick="selectStop('${key.replace(/'/g, "\\'")}')">
      <div class="stop-item-top">
        <div class="stop-num">${stopLabel(g.orders)}</div>
        <span class="order-count ${multi?'multi':'single'}">${g.orders.length}×</span>
      </div>
      <div class="stop-shipper">${g.shipper}</div>
      <div class="stop-addr">${addrShort}</div>
      <div class="stop-wt">${fmtW(totalW)} &nbsp;·&nbsp; ${fmtPL(totalPL)}</div>
      ${chips ? `<div class="stop-chips">${chips}</div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('stopList').innerHTML = html || `<div style="padding:20px;color:var(--text3);font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-align:center">NO STOPS ASSIGNED</div>`;
  const remaining = groups.filter(g=>!isDone(g)).length;
  document.getElementById('stopCount').textContent = `${remaining}/${groups.length}`;
}

// ── RENDER HEADER ──
function renderHeader() {
  const tabsHtml = DRIVERS.map(d => {
    const groups = getStopsForDriver(d.id);
    const total = groups.length;
    const doneCount = groups.filter(g=>isDone(g)).length;
    const pct = total ? (doneCount/total*100) : 0;
    return `<button class="driver-tab${activeDriver===d.id?' active':''}" onclick="setDriver('${d.id}')">
      ${d.name}${total?'':' —'}
      ${total && activeDriver!==d.id ? `<div class="tab-progress" style="width:${pct}%"></div>` : ''}
    </button>`;
  }).join('');
  document.getElementById('driverTabs').innerHTML = tabsHtml;

  const groups = getStopsForDriver(activeDriver);
  const doneCount = groups.filter(g=>isDone(g)).length;
  const dr = DRIVERS.find(x=>x.id===activeDriver);
  const totalW = dr ? RAW.filter(r=>r.stop>=dr.range[0]&&r.stop<=dr.range[1]).reduce((s,o)=>s+(o.weight||0),0) : 0;

  document.getElementById('headerStats').innerHTML = `
    <div class="stat"><div class="stat-val">${doneCount}/${groups.length}</div><div class="stat-lbl">Stops</div></div>
    <div class="stat"><div class="stat-val">${totalW.toLocaleString()}</div><div class="stat-lbl">Total lbs</div></div>
  `;
}

// ── BUILD DETAIL HTML (shared by desktop + mobile modal) ──
function buildDetailHTML(key, forModal) {
  const groups = getStopsForDriver(activeDriver);
  const g = groups.find(x => gKey(x) === key);
  if (!g) return '';

  const d = isDone(g);
  const allGroups = getStopsForDriver(activeDriver);
  const doneCount = allGroups.filter(x=>isDone(x)).length;
  const pct = allGroups.length ? doneCount/allGroups.length*100 : 0;

  const totalW = g.orders.reduce((s,o)=>s+(o.weight||0),0);
  const totalPL = g.orders.reduce((s,o)=>s+(o.pl||0),0);
  const warnFlag = g.orders.some(o => (o.appt||'').toUpperCase().includes('CANCEL'));

  const mapUrl = 'https://maps.google.com/?q=' + encodeURIComponent(g.address);
  const phoneRaw = g.phone || '';
  const phone = phoneRaw && !/^[a-z]/i.test(phoneRaw) ? phoneRaw.replace(/\D/g,'') : null;

  const pickupDates = [...new Set(g.orders.map(o=>o.pickupDateTime).filter(Boolean))].join(', ');
  const skip = ['CONF RDY','NEED','OK','CONF','REQ',''];
  const apptInfos = [...new Set(g.orders.map(o=>o.appt).filter(a=>a&&!skip.includes(a.toUpperCase().trim())))];

  let alerts = '';
  if (warnFlag) {
    const wo = g.orders.find(o=>(o.appt||'').toUpperCase().includes('CANCEL'));
    alerts = '<div class="alert-banner alert-warn">&#9888; ' + (wo ? wo.appt : '') + ' — Verify before pickup</div>';
  }

  const apptBlock = apptInfos.length ? '<div class="appt-block">&#128203; ' + apptInfos.join(' · ') + '</div>' : '';
  const safeKey = key.replace(/'/g, "\'");
  const progressBar = forModal ? '' : '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div>';

  const ordersHtml = g.orders.map(o => {
    const tempCls = getTempClass(o);
    const chips = tempCls ? chip(tempCls, tempCls) : '';
    return '<div class="order-card">' +
      '<div>' +
        '<div class="order-customer">' + o.customer + '</div>' +
        (o.consignee && o.consignee !== o.customer ? '<div class="order-consignee">→ ' + o.consignee + '</div>' : '') +
        '<div class="order-dest">▸ ' + o.delCity + ', ' + o.delSt + '</div>' +
        '<div class="order-meta">' +
          (o.po ? '<div class="meta-field"><div class="meta-lbl">PO #</div><div class="meta-val">' + o.po + '</div></div>' : '') +
          (o.bol ? '<div class="meta-field"><div class="meta-lbl">BOL</div><div class="meta-val">' + o.bol + '</div></div>' : '') +
          (o.shipRef ? '<div class="meta-field"><div class="meta-lbl">Ref #</div><div class="meta-val">' + o.shipRef + '</div></div>' : '') +
          (o.pickupDateTime ? '<div class="meta-field"><div class="meta-lbl">Pickup Date &amp; Time</div><div class="meta-val">' + o.pickupDateTime + '</div></div>' : '') +
        '</div>' +
        (chips ? '<div class="order-chips">' + chips + '</div>' : '') +
      '</div>' +
      '<div class="order-right">' +
        '<div class="order-wt">' + fmtW(o.weight) + '</div>' +
        '<div class="order-pl">' + fmtPL(o.pl) + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  return progressBar +
    '<div class="detail-hdr">' +
      '<div>' +
        '<div class="detail-stopnum">' + stopLabel(g.orders) + '</div>' +
        '<div class="detail-title">' + g.shipper + '</div>' +
        '<div class="detail-addr">' + g.address + '</div>' +
      '</div>' +
      '<div class="detail-actions">' +
        (g.address ? '<a href="' + mapUrl + '" target="_blank" class="btn btn-nav">&#128205; Navigate</a>' : '') +
        (phone ? '<a href="tel:' + phone + '" class="btn btn-call">&#128222; Call</a>' : '') +
        '<button class="btn ' + (d ? 'btn-undone' : 'btn-done') + '" onclick="toggleDone('' + safeKey + '')">' +
          (d ? '↩ Undo' : '✓ Done') +
        '</button>' +
      '</div>' +
    '</div>' +
    alerts +
    apptBlock +
    '<div class="summary-bar">' +
      '<div class="sum-item"><div class="sum-lbl">Orders</div><div class="sum-val">' + g.orders.length + '</div></div>' +
      '<div class="sum-item"><div class="sum-lbl">Total Weight</div><div class="sum-val">' + fmtW(totalW) + '</div></div>' +
      '<div class="sum-item"><div class="sum-lbl">Total Pallets</div><div class="sum-val">' + (totalPL > 0 ? totalPL + ' PLT' : '—') + '</div></div>' +
      (pickupDates ? '<div class="sum-item"><div class="sum-lbl">Pickup Date &amp; Time</div><div class="sum-val">' + pickupDates + '</div></div>' : '') +
    '</div>' +
    (phone ? '<div class="phone-block"><div><div class="phone-lbl">Shipper Phone</div><div class="phone-num">' + g.phone + '</div></div><a href="tel:' + phone + '" class="btn btn-call">Call</a></div>' : '') +
    '<div class="section-lbl">Orders at this location (' + g.orders.length + ')</div>' +
    '<div class="orders-list">' + ordersHtml + '</div>';
}

// ── RENDER DETAIL (desktop panel) ──
function renderDetail(key) {
  document.getElementById('mainPanel').innerHTML = buildDetailHTML(key, false);
}

// ── INTERACTIONS ──
function isMobile() { return window.innerWidth <= 680; }

function selectStop(key) {
  activeKey = key;
  renderSidebar();
  if (isMobile()) {
    openModal(key);
  } else {
    renderDetail(key);
    document.getElementById('mainPanel').scrollTop = 0;
  }
}

function openModal(key) {
  const overlay = document.getElementById('modalOverlay');
  const inner = document.getElementById('modalInner');
  inner.innerHTML = buildDetailHTML(key);
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('modalSheet').scrollTop = 0;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function setDriver(id) {
  activeDriver = id;
  activeKey = null;
  renderHeader();
  renderSidebar();
  showEmpty();
}

function toggleDone(key) {
  const groups = getStopsForDriver(activeDriver);
  const g = groups.find(x => gKey(x) === key);
  if (!g) return;

  const nowDone = isDone(g);
  const setTo = !nowDone;

  // Optimistic update locally
  g.orders.forEach(o => {
    if (setTo) done[o.stopVal] = true;
    else delete done[o.stopVal];
    // Write each stop to the sheet
    setDoneOnSheet(o.stopVal, setTo);
  });

  renderHeader();
  renderSidebar();
  if (activeKey === key) {
    if (isMobile()) {
      // Refresh modal content in place
      const inner = document.getElementById('modalInner');
      if (inner && document.getElementById('modalOverlay').classList.contains('open')) {
        inner.innerHTML = buildDetailHTML(key, true);
      }
    } else {
      renderDetail(key);
    }
  }
}

// ── UI STATES ──
function showEmpty() {
  document.getElementById('mainPanel').innerHTML = `<div class="empty-state"><img class="empty-logo" src="${document.getElementById('logoImg').src}" alt=""><div class="empty-txt">Select a stop</div></div>`;
}

function showLoading() {
  document.getElementById('mainPanel').innerHTML = `
    <div class="empty-state">
      <div style="width:48px;height:48px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:14px"></div>
      <div class="empty-txt">Loading route data...</div>
    </div>`;
  document.getElementById('stopList').innerHTML = `<div style="padding:20px;color:var(--text3);font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-align:center">Loading...</div>`;
}

function showError(msg) {
  document.getElementById('mainPanel').innerHTML = `
    <div class="empty-state">
      <div style="font-size:36px;opacity:0.4;margin-bottom:12px">⚠</div>
      <div class="empty-txt" style="color:var(--red)">Failed to load data</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:8px;max-width:300px;text-align:center">${msg}</div>
      <button class="btn btn-nav" style="margin-top:16px" onclick="loadData()">↺ Retry</button>
    </div>`;
}

// ── LOAD DATA ──
async function loadData() {
  showLoading();
  try {
    const resp = await fetch(APPS_SCRIPT_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    if (!Array.isArray(json) || !json.length) throw new Error('Sheet returned no data');
    const parsed = json.map(rowToStop).filter(Boolean);
    if (!parsed.length) throw new Error('No stop data found. Keys: ' + Object.keys(json[0]).join(', '));
    RAW = parsed;
    syncDone(json);
    renderHeader();
    renderSidebar();
    showEmpty();
    lastDataHash = hashData(json);
    startPolling();
  } catch(e) {
    showError(e.message || 'Unknown error');
    console.error('Providence Dispatch load error:', e);
  }
}

// ── SPIN ANIMATION ──
const style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);

// ── INIT ──
loadData();

</script>
