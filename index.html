<title>Providence Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0b;
    --dark1: #111214;
    --dark2: #18191d;
    --dark3: #1f2127;
    --border: #2c2e36;
    --border2: #383b46;
    --gold: #e8a820;
    --gold2: #f5c842;
    --gold-dim: rgba(232,168,32,0.15);
    --gold-border: rgba(232,168,32,0.3);
    --blue: #4ca8d4;
    --green: #4dbf7f;
    --red: #e05454;
    --amber: #e87c28;
    --text: #dde0ea;
    --text2: #c8ccd8;
    --text3: #9ea4b5;
    --mono: 'Barlow Condensed', sans-serif;
    --sans: 'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--dark1);
    border-bottom: 2px solid var(--gold);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 58px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-right: 16px;
    border-right: 1px solid var(--border2);
  }

  .logo-img {
    height: 38px;
    width: 38px;
    object-fit: contain;
    filter: invert(1) sepia(1) saturate(3) hue-rotate(0deg) brightness(0.9);
  }

  .logo-text {
    font-family: var(--mono);
    font-weight: 800;
    font-size: 17px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    line-height: 1;
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin-top: 2px;
  }

  .driver-tabs {
    display: flex;
    gap: 4px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .driver-tabs::-webkit-scrollbar { display: none; }

  .driver-tab {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
    position: relative;
  }

  .driver-tab:hover { border-color: var(--gold); color: var(--gold); }
  .driver-tab.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
    font-weight: 800;
  }

  .tab-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: var(--green);
    border-radius: 0 0 3px 3px;
    transition: width 0.3s ease;
  }

  .header-stats {
    display: flex;
    gap: 16px;
    align-items: center;
    padding-left: 12px;
    border-left: 1px solid var(--border2);
    white-space: nowrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 1px;
  }

  .stat-val {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-lbl {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 58px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--dark1);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    height: calc(100vh - 58px);
    position: sticky;
    top: 58px;
  }

  .sidebar-hdr {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-hdr-lbl {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .sidebar-hdr-count {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
  }

  .stop-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
    border-left: 3px solid transparent;
  }

  .stop-item:hover { background: var(--dark2); }

  .stop-item.active {
    background: var(--dark3);
    border-left-color: var(--gold);
  }

  .stop-item.done {
    opacity: 0.38;
  }

  .stop-item-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 4px;
  }

  .stop-num {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--gold);
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .stop-shipper {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text);
    line-height: 1.25;
    text-transform: uppercase;
  }

  .order-count {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .order-count.single { background: var(--dark3); color: var(--text3); border: 1px solid var(--border2); }
  .order-count.multi { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold-border); }

  .stop-addr {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 5px;
  }

  .stop-wt {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
  }

  .stop-chips {
    display: flex;
    gap: 4px;
    margin-top: 5px;
    flex-wrap: wrap;
  }

  .chip {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
  }

  .chip-frozen { background: rgba(76,168,212,0.12); color: var(--blue); border: 1px solid rgba(76,168,212,0.25); }
  .chip-cold { background: rgba(77,191,127,0.1); color: var(--green); border: 1px solid rgba(77,191,127,0.2); }
  .chip-dry { background: rgba(232,168,32,0.1); color: var(--gold); border: 1px solid rgba(232,168,32,0.2); }
  .chip-cash { background: rgba(86,212,139,0.12); color: #56d48b; border: 1px solid rgba(86,212,139,0.3); font-weight: 800; }
  .chip-appt { background: rgba(232,168,32,0.08); color: var(--gold2); border: 1px solid rgba(232,168,32,0.15); }
  .chip-warn { background: rgba(232,124,40,0.1); color: var(--amber); border: 1px solid rgba(232,124,40,0.2); }

  /* ── MAIN PANEL ── */
  .main {
    padding: 24px 28px;
    overflow-y: auto;
    min-height: calc(100vh - 58px);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 55vh;
    gap: 14px;
  }

  .empty-logo {
    width: 80px;
    opacity: 0.12;
    filter: invert(1);
  }

  .empty-txt {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
  }

  /* ── DETAIL ── */
  .prog-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 22px;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .detail-hdr {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .detail-stopnum {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .detail-title {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1.1;
  }

  .detail-addr {
    font-size: 12px;
    color: var(--text3);
    margin-top: 6px;
    font-family: var(--mono);
    letter-spacing: 0.04em;
  }

  .detail-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
    transition: all 0.12s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    min-height: 44px;
    user-select: none;
    -webkit-user-select: none;
  }

  .btn-nav { background: var(--dark3); color: var(--blue); border: 1px solid rgba(76,168,212,0.3); }
  .btn-nav:hover { background: rgba(76,168,212,0.12); border-color: var(--blue); }
  .btn-call { background: var(--dark3); color: var(--green); border: 1px solid rgba(77,191,127,0.25); }
  .btn-call:hover { background: rgba(77,191,127,0.1); border-color: var(--green); }
  .btn-done { background: var(--gold); color: #000; }
  .btn-done:hover { background: var(--gold2); }
  .btn-undone { background: var(--dark3); color: var(--text3); border: 1px solid var(--border2); }
  .btn-undone:hover { border-color: var(--gold); color: var(--gold); }

  /* alert banner */
  .alert-banner {
    padding: 11px 16px;
    border-radius: 3px;
    margin-bottom: 18px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .alert-warn { background: rgba(232,124,40,0.08); border: 1px solid rgba(232,124,40,0.25); color: var(--amber); }
  .alert-cash { background: rgba(86,212,139,0.08); border: 1px solid rgba(86,212,139,0.35); color: #56d48b; font-size: 13px; font-weight: 700; letter-spacing: 0.03em; }

  /* summary bar */
  .summary-bar {
    display: flex;
    gap: 0;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 22px;
    overflow: hidden;
  }

  .sum-item {
    padding: 12px 18px;
    border-right: 1px solid var(--border);
    flex: 1;
    min-width: 0;
  }

  .sum-item:last-child { border-right: none; }

  .sum-lbl {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 3px;
  }

  .sum-val {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* phone block */
  .phone-block {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 22px;
  }

  .phone-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); margin-bottom: 2px; }
  .phone-num { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--blue); }

  /* appt block */
  .appt-block {
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    border-radius: 4px;
    padding: 10px 16px;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--gold2);
  }

  /* section label */
  .section-lbl {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* orders */
  .orders-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 30px; }

  .order-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 14px;
    align-items: start;
  }

  .order-card:hover { border-color: var(--border2); }

  .order-customer { font-family: var(--mono); font-size: 14px; font-weight: 700; text-transform: uppercase; color: var(--text); margin-bottom: 3px; letter-spacing: 0.03em; }

  .order-consignee { font-size: 12px; color: var(--text2); margin-bottom: 6px; }

  .order-dest { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-bottom: 8px; letter-spacing: 0.04em; }

  .order-meta { display: flex; gap: 16px; flex-wrap: wrap; }

  .meta-field { display: flex; flex-direction: column; gap: 2px; }
  .meta-lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
  .meta-val { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--text2); }

  .order-right { text-align: right; }
  .order-wt { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--text); }
  .order-pl { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 2px; }

  .order-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── TRIP HEADER ── */
  .trip-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 6px;
    background: var(--dark3);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .trip-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .trip-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  /* ── MODAL (mobile stop detail popup) ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal-sheet {
    background: var(--dark1);
    border-radius: 12px 12px 0 0;
    border-top: 2px solid var(--gold);
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border2);
    border-radius: 2px;
    margin: 12px auto 0;
  }

  .modal-inner {
    padding: 16px 18px 24px;
  }

  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
  }

  @media (max-width: 680px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { height: auto; position: static; border-right: none; }
    .main { display: none; } /* hidden on mobile — detail shown in modal */
    header { flex-wrap: wrap; height: auto; padding: 10px 12px; gap: 8px; }
    .header-stats { display: none; }
    .logo-text { font-size: 15px; }
    .logo-sub { font-size: 9px; }
    .logo-img { height: 32px; width: 32px; }
    .driver-tabs { gap: 3px; }
    .driver-tab { font-size: 11px; padding: 5px 10px; }
    .stop-item { padding: 14px 14px; }
    .stop-shipper { font-size: 15px; }
    .stop-addr { font-size: 12px; }
    .stop-wt { font-size: 12px; }
    .stop-num { font-size: 11px; }
    .order-count { font-size: 11px; }
    /* make stop list taller and touch-friendly */
    .sidebar { min-height: calc(100vh - 80px); }


  /* ── PDF TOOLBAR ── */
  .pdf-toolbar {
    background: var(--dark2);
    border-bottom: 1px solid var(--border);
    padding: 6px 20px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }

  .pdf-toolbar-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    white-space: nowrap;
  }

  .pdf-btn {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 3px;
    border: 1px solid var(--gold-border);
    background: var(--gold-dim);
    color: var(--gold);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.12s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .pdf-btn:hover { background: var(--gold); color: #000; }
  .pdf-btn:active { opacity: 0.8; }

  .pdf-btn.loading { opacity: 0.6; pointer-events: none; }

  }
</style>

// ── CONFIG ──
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR76UlgWFXKhCHftEMGkqRP_ILPCqLCy7cnZWW_8XbCtlKde0UtcD1BlJFjkRYkZCi/exec';

// ── DRIVER CONFIG ──
const DRIVERS = [
  {id:"johnny",    name:"Johnny",     range:[1,  20]},
  {id:"mike",      name:"Mike",       range:[21, 40]},
  {id:"newdriver", name:"James", range:[41, 60]},
  {id:"chentos",   name:"Chentos",    range:[61, 80]},
  {id:"chn",       name:"CHN 1",        range:[81, 100]},
  {id:"john",      name:"CHN 2",       range:[101,130]},
];

// ── STATE ──
let RAW = [];
let CASH_FLAGS = {}; // { "SHIPPER NAME UPPERCASE": { message, amount } }
let activeDriver = "johnny";
let activeKey = null;
let done = {}; // { "STOP 01": true, ... } — synced across all users via Google Sheet

// ── POLLING (every 30s) ──
let pollInterval = null;
let lastDataHash = '';

function hashData(json) {
  // Quick fingerprint of the data to detect any change
  const hashRows = Array.isArray(json) ? json : (json.rows || []);
  return JSON.stringify(hashRows.map(r => ({
    s: r['STOP'], w: r['WEIGHT'], p: r['PICKED'],
    a: r['APPOINTMENT INFO'], ph: r['PHONE NUMBER']
  })));
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    try {
      const resp = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now()); // cache-bust
      if (!resp.ok) return;
      const json = await resp.json();
      if (!json || (Array.isArray(json) && !json.length) || (!Array.isArray(json) && !json.rows)) return;

      const newHash = hashData(json);
      if (newHash === lastDataHash) return; // nothing changed
      lastDataHash = newHash;

      const pollRows = Array.isArray(json) ? json : (json.rows || []);
      CASH_FLAGS = Array.isArray(json) ? {} : (json.cashFlags || {});
      const parsed = parseRows(pollRows);
      if (!parsed.length) return;

      const prevRAW = RAW;
      RAW = parsed;
      syncDone(pollRows);
      renderHeader();
      renderSidebar();

      if (activeKey) {
        const prevGroup = getGroupFromRAW(prevRAW, activeKey);
        const newGroup = getStopsForDriver(activeDriver).find(x => gKey(x) === activeKey);
        const changed = prevGroup && newGroup &&
          JSON.stringify(prevGroup.orders) !== JSON.stringify(newGroup.orders);

        if (isMobile()) {
          const overlay = document.getElementById('modalOverlay');
          const inner = document.getElementById('modalInner');
          if (overlay.classList.contains('open') && inner) {
            inner.innerHTML = buildDetailHTML(activeKey, true);

          }
        } else {
          renderDetail(activeKey);
        }

        if (changed) showUpdateToast();
      }
    } catch(e) { /* silent poll failure */ }
  }, 30000);
}

function getGroupFromRAW(rawData, key) {
  // key format: "tripIndex|address" — just compare orders by address+trip
  const d = DRIVERS.find(x => x.id === activeDriver);
  if (!d) return null;
  const rows = rawData.filter(r => !r.tripBreak && r.stop >= d.range[0] && r.stop <= d.range[1]);
  const byAddr = {};
  rows.forEach(r => {
    const k = r.address.trim().toLowerCase().replace(/\s+/g,' ');
    if (!byAddr[k]) byAddr[k] = {orders:[]};
    byAddr[k].orders.push(r);
  });
  // Strip tripIndex prefix from key for lookup
  const addrKey = key.includes('|') ? key.split('|').slice(1).join('|') : key;
  return byAddr[addrKey] || null;
}

function showUpdateToast() {
  // Remove any existing toast
  const existing = document.getElementById('update-toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.id = 'update-toast';
  toast.innerHTML = '↻ Stop details updated';
  toast.style.cssText = `
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--gold); color: #000;
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 10px 20px; border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 999; opacity: 0;
    transition: opacity 0.3s ease;
  `;
  document.body.appendChild(toast);
  requestAnimationFrame(() => { toast.style.opacity = '1'; });
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function syncDone(json) {
  done = {};
  const syncRows = Array.isArray(json) ? json : (json.rows || []);
  syncRows.forEach(r => {
    const stop = (r['STOP'] || '').trim();
    const picked = (r['PICKED'] || '').trim().toUpperCase();
    if (stop && picked === 'DONE') done[stop] = true;
  });
}

// ── WRITE DONE STATUS BACK TO SHEET ──
async function setDoneOnSheet(stopVal, isDoneVal) {
  try {
    const url = APPS_SCRIPT_URL + '?action=setDone&stop=' + encodeURIComponent(stopVal) + '&done=' + isDoneVal;
    await fetch(url);
  } catch(e) {
    console.error('setDone error:', e);
  }
}

// ── PARSE ROW → stop object ──
// Exact headers from PICKUPS sheet:
// STOP | ADDRESS | PHONE NUMBER | CUSTOMER | SHIPPER | PICKUP DATE & TIME |
// CONSIGNEE NAME | DELIVERTY CITY | DELIVERY ST | PO#  | BOL # | SHIP REF |
// WEIGHT | PL | APPOINTMENT INFO | PICKED
function rowToStop(r) {
  // Normalize lookup: try exact key first, then trimmed, then uppercase-trimmed
  const get = (...keys) => {
    for (const k of keys) {
      // Exact match
      if (r[k] !== undefined && r[k] !== null && String(r[k]).trim() !== '') return String(r[k]).trim();
      // Trimmed match (handles trailing/leading spaces in header names)
      const trimK = k.trim();
      for (const rk of Object.keys(r)) {
        if (rk.trim() === trimK && String(r[rk]).trim() !== '') return String(r[rk]).trim();
      }
    }
    return '';
  };

  const stopVal = get('STOP');
  if (!stopVal || stopVal.toUpperCase() === 'X') return null;

  const stopMatch = stopVal.match(/\d+/);
  if (!stopMatch) return null;
  const stopNum = parseInt(stopMatch[0]);

  const shipper = get('SHIPPER');
  if (!shipper) return null;

  const wRaw = get('WEIGHT').replace(/,/g,'');
  const weight = parseFloat(wRaw) || 0;
  const pl = parseFloat(get('PL')) || 0;

  // Parse pickup datetime from display value (e.g. "5/6/2026 6:00 AM" or "5/6/2026 6:00:00")
  // getDisplayValues() in Apps Script returns the cell text exactly as shown — no timezone shift
  let pickupDateTime = '';
  const pdRaw = get('PICKUP DATE & TIME');
  if (pdRaw) {
    // Match "M/D/YYYY H:MM AM/PM" or "M/D/YYYY H:MM:SS" or "M/D/YYYY"
    const m1 = pdRaw.match(/^(\d{1,2})\/( \d{1,2})(?:\/\d{2,4})?(?:[,\s]+(.+))?$/);
    const m2 = pdRaw.match(/^(\d{1,2})\/(\d{1,2})(?:\/\d{2,4})?(?:\s+(\d{1,2}):(\d{2})(?::\d{2})?(?:\s*(AM|PM))?)?/i);
    if (m2) {
      const month = m2[1];
      const day   = m2[2];
      const hRaw  = m2[3];
      const mRaw  = m2[4];
      const ampm  = m2[5] ? m2[5].toUpperCase() : null;
      if (hRaw !== undefined) {
        let h = parseInt(hRaw);
        const mins = parseInt(mRaw) || 0;
        let suffix = ampm;
        if (!suffix) {
          // 24-hour format — convert to 12h
          suffix = h >= 12 ? 'PM' : 'AM';
          h = h % 12 || 12;
        }
        if (h === 12 && mins === 0 && suffix === 'AM') {
          // midnight — just show date
          pickupDateTime = month + '/' + day;
        } else {
          const mStr = mins > 0 ? ':' + String(mins).padStart(2,'0') : '';
          pickupDateTime = month + '/' + day + ' ' + h + mStr + ' ' + suffix;
        }
      } else {
        pickupDateTime = month + '/' + day;
      }
    } else {
      // Fallback — show whatever the sheet gave us
      pickupDateTime = pdRaw;
    }
  }

  return {
    stop: stopNum,
    stopVal: stopVal,  // original e.g. "STOP 01"
    shipper: shipper,
    address: get('ADDRESS'),
    phone: get('PHONE NUMBER'),
    customer: get('CUSTOMER'),
    consignee: get('CONSIGNEE NAME'),
    delCity: get('DELIVERTY CITY'),
    delSt: get('DELIVERY ST'),
    weight: weight,
    pl: pl,
    pickupDateTime: pickupDateTime,
    po: get('PO# ', 'PO #', 'PO#'),
    bol: get('BOL #'),
    shipRef: get('SHIP REF'),
    appt: get('APPOINTMENT INFO'),
  };
}

// ── CONTEXT-AWARE ROW PARSER ──
// Trip break = a row that has a STOP number but an empty SHIPPER.
// e.g. {"STOP":"STOP 89", "SHIPPER":"", ...everything else empty}
function parseRows(json) {
  const result = [];
  for (let i = 0; i < json.length; i++) {
    const r = json[i];
    const shipper = (r['SHIPPER'] || '').trim();
    const stopVal  = (r['STOP']    || '').trim();

    // Row has a STOP value but no SHIPPER = trip divider
    if (stopVal && !shipper) {
      // Only insert a break if previous entry was a real stop (avoid double-breaks)
      const prev = result[result.length - 1];
      if (prev && !prev.tripBreak) {
        result.push({ tripBreak: true });
      }
      continue;
    }

    // Fully empty row — skip
    if (!stopVal && !shipper) continue;

    const parsed = rowToStop(r);
    if (parsed) result.push(parsed);
  }
  return result;
}

// ── HELPERS ──
function getStopsForDriver(id) {
  const d = DRIVERS.find(x => x.id === id);
  if (!d) return [];

  // Get all rows for this driver including trip break markers
  const rows = RAW.filter(r => r.tripBreak || (r.stop >= d.range[0] && r.stop <= d.range[1]));

  // Split into trips at each tripBreak marker
  const trips = [[]];
  rows.forEach(r => {
    if (r.tripBreak) {
      // Only start a new trip if current trip has stops
      if (trips[trips.length - 1].length > 0) trips.push([]);
    } else {
      trips[trips.length - 1].push(r);
    }
  });

  // Consolidate each trip's stops by address, then flatten with trip metadata
  const result = [];
  trips.forEach((tripRows, tripIdx) => {
    if (!tripRows.length) return;
    const byAddr = {};
    tripRows.forEach(r => {
      const key = r.address.trim().toLowerCase().replace(/\s+/g,' ');
      if (!byAddr[key]) byAddr[key] = {address:r.address, phone:r.phone, shipper:r.shipper, orders:[], firstStop:r.stop, tripIndex:tripIdx};
      const g = byAddr[key];
      g.orders.push(r);
      if (r.stop < g.firstStop) { g.firstStop = r.stop; g.shipper = r.shipper; g.phone = r.phone || g.phone; }
    });
    const sorted = Object.values(byAddr).sort((a,b) => a.firstStop - b.firstStop);
    sorted.forEach(g => result.push(g));
  });

  return result;
}

// Returns trips as separate arrays (for sidebar grouping)
function getTripsForDriver(id) {
  const d = DRIVERS.find(x => x.id === id);
  if (!d) return [];

  const rows = RAW.filter(r => r.tripBreak || (r.stop >= d.range[0] && r.stop <= d.range[1]));
  const trips = [[]];
  rows.forEach(r => {
    if (r.tripBreak) {
      if (trips[trips.length - 1].length > 0) trips.push([]);
    } else {
      trips[trips.length - 1].push(r);
    }
  });

  return trips.filter(t => t.length > 0).map((tripRows, tripIdx) => {
    const byAddr = {};
    tripRows.forEach(r => {
      const key = r.address.trim().toLowerCase().replace(/\s+/g,' ');
      if (!byAddr[key]) byAddr[key] = {address:r.address, phone:r.phone, shipper:r.shipper, orders:[], firstStop:r.stop, tripIndex:tripIdx};
      const g = byAddr[key];
      g.orders.push(r);
      if (r.stop < g.firstStop) { g.firstStop = r.stop; g.shipper = r.shipper; g.phone = r.phone || g.phone; }
    });
    return Object.values(byAddr).sort((a,b) => a.firstStop - b.firstStop);
  });
}

function getCashFlag(shipperName) {
  if (!shipperName || !CASH_FLAGS) return null;
  return CASH_FLAGS[shipperName.trim().toUpperCase()] || null;
}

function gKey(g) { return g.tripIndex + '|' + g.address.trim().toLowerCase().replace(/\s+/g,' '); }

function isDone(g) {
  return g.orders.some(o => !!done[o.stopVal]);
}

function stopLabel(orders) {
  const nums = [...new Set(orders.map(o=>o.stop))].sort((a,b)=>a-b);
  const lbl = n => String(n).padStart(2,'0');
  return nums.length === 1 ? `STOP ${lbl(nums[0])}` : `STOPS ${nums[0]}–${nums[nums.length-1]}`;
}

function fmtW(w) { return w > 0 ? w.toLocaleString() + ' lbs' : '—'; }
function fmtPL(p) { return p > 0 ? p + ' PLT' : '—'; }

function getTempClass(o) {
  const s = (o.bol + ' ' + o.appt).toUpperCase();
  if (s.includes('FROZEN')) return 'frozen';
  if (s.includes('COLD') || s.includes('CHILL')) return 'cold';
  if (s.includes('DRY')) return 'dry';
  return '';
}

function hasApptInfo(orders) {
  const skip = ['CONF RDY','NEED','OK','CONF','REQ','EMAIL REQ',''];
  return orders.some(o => o.appt && !skip.includes(o.appt.toUpperCase().trim()));
}

function chip(cls, label) { return `<span class="chip chip-${cls}">${label}</span>`; }

// ── RENDER SIDEBAR ──
function renderSidebar() {
  const trips = getTripsForDriver(activeDriver);
  const allGroups = trips.flat();
  const multiTrip = trips.length > 1;

  function renderGroup(g) {
    const key = gKey(g);
    const active = activeKey === key;
    const d = isDone(g);
    const multi = g.orders.length > 1;
    const totalW = g.orders.reduce((s,o)=>s+(o.weight||0),0);
    const totalPL = g.orders.reduce((s,o)=>s+(o.pl||0),0);
    const temps = [...new Set(g.orders.map(getTempClass).filter(Boolean))];
    const apptFlag = hasApptInfo(g.orders);
    const warnFlag = g.orders.some(o => (o.appt||'').toUpperCase().includes('CANCEL'));
    let chips = '';
    temps.forEach(t => { chips += chip(t, t); });
    if (apptFlag) chips += chip('appt', 'APPT');
    if (warnFlag) chips += chip('warn', '&#9888; WARNING');
    const cashFlag = getCashFlag(g.shipper);
    if (cashFlag) chips += chip('cash', '&#x1F4B5; CASH' + (cashFlag.amount ? ' ' + cashFlag.amount : ''));
    const addrShort = g.address.split(',').slice(-1)[0].trim() || g.address;
    const el = document.createElement('div');
    el.className = 'stop-item' + (active ? ' active' : '') + (d ? ' done' : '');
    el.dataset.key = key;
    el.addEventListener('click', function() { selectStop(this.dataset.key); });
    el.innerHTML = '<div class="stop-item-top">'
      + '<div class="stop-num">' + stopLabel(g.orders) + '</div>'
      + '<span class="order-count ' + (multi?'multi':'single') + '">' + g.orders.length + '&times;</span>'
      + '</div>'
      + '<div class="stop-shipper">' + g.shipper + '</div>'
      + '<div class="stop-addr">' + addrShort + '</div>'
      + '<div class="stop-wt">' + fmtW(totalW) + ' &nbsp;&middot;&nbsp; ' + fmtPL(totalPL) + '</div>'
      + (chips ? '<div class="stop-chips">' + chips + '</div>' : '');
    return el;
  }
  const container = document.getElementById('stopList');
  container.innerHTML = '';
  const frag = document.createDocumentFragment();

  if (!allGroups.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:20px;color:var(--text3);font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-align:center';
    empty.textContent = 'NO STOPS ASSIGNED';
    frag.appendChild(empty);
  } else if (!multiTrip) {
    // Single trip — show a summary header before the stop list
    const totalW  = allGroups.reduce(function(s,g){ return s + g.orders.reduce(function(s2,o){ return s2+(o.weight||0); },0); }, 0);
    const totalPL = allGroups.reduce(function(s,g){ return s + g.orders.reduce(function(s2,o){ return s2+(o.pl||0); },0); }, 0);
    const doneCount = allGroups.filter(g=>isDone(g)).length;
    const hdr = document.createElement('div');
    hdr.className = 'trip-header';
    hdr.innerHTML = '<span class="trip-label">&#9654; ROUTE</span>'
      + '<span class="trip-meta">' + doneCount + '/' + allGroups.length + ' stops'
      + ' &nbsp;&middot;&nbsp; ' + totalW.toLocaleString() + ' lbs'
      + (totalPL > 0 ? ' &nbsp;&middot;&nbsp; ' + totalPL + ' PLT' : '') + '</span>';
    frag.appendChild(hdr);
    allGroups.forEach(g => frag.appendChild(renderGroup(g)));
  } else {
    trips.forEach(function(tripGroups, idx) {
      const doneCount = tripGroups.filter(g=>isDone(g)).length;
      const tripW  = tripGroups.reduce(function(s,g){ return s + g.orders.reduce(function(s2,o){ return s2+(o.weight||0); },0); }, 0);
      const tripPL = tripGroups.reduce(function(s,g){ return s + g.orders.reduce(function(s2,o){ return s2+(o.pl||0); },0); }, 0);
      const hdr = document.createElement('div');
      hdr.className = 'trip-header';
      hdr.innerHTML = '<span class="trip-label">&#9654; TRIP ' + (idx+1) + '</span>'
        + '<span class="trip-meta">' + doneCount + '/' + tripGroups.length + ' stops'
        + ' &nbsp;&middot;&nbsp; ' + tripW.toLocaleString() + ' lbs'
        + (tripPL > 0 ? ' &nbsp;&middot;&nbsp; ' + tripPL + ' PLT' : '') + '</span>';
      frag.appendChild(hdr);
      tripGroups.forEach(g => frag.appendChild(renderGroup(g)));
    });
  }

  container.appendChild(frag);
  const remaining = allGroups.filter(g=>!isDone(g)).length;
  document.getElementById('stopCount').textContent = remaining + '/' + allGroups.length;
}

// ── RENDER HEADER ──
function renderHeader() {
  const tabsHtml = DRIVERS.map(d => {
    const groups = getTripsForDriver(d.id).flat();
    const total = groups.length;
    const doneCount = groups.filter(g=>isDone(g)).length;
    const pct = total ? (doneCount/total*100) : 0;
    return `<button class="driver-tab${activeDriver===d.id?' active':''}" onclick="setDriver('${d.id}')">
      ${d.name}${total?'':' —'}
      ${total && activeDriver!==d.id ? `<div class="tab-progress" style="width:${pct}%"></div>` : ''}
    </button>`;
  }).join('');
  document.getElementById('driverTabs').innerHTML = tabsHtml;

  const groups = getTripsForDriver(activeDriver).flat();
  const doneCount = groups.filter(g=>isDone(g)).length;
  const dr = DRIVERS.find(x=>x.id===activeDriver);
  const totalW = dr ? RAW.filter(r=>!r.tripBreak&&r.stop>=dr.range[0]&&r.stop<=dr.range[1]).reduce((s,o)=>s+(o.weight||0),0) : 0;

  document.getElementById('headerStats').innerHTML = `
    <div class="stat"><div class="stat-val">${doneCount}/${groups.length}</div><div class="stat-lbl">Stops</div></div>
    <div class="stat"><div class="stat-val">${totalW.toLocaleString()}</div><div class="stat-lbl">Total lbs</div></div>
  `;
}

// ── BUILD DETAIL HTML (shared by desktop + mobile modal) ──
function buildDetailHTML(key, forModal) {
  const groups = getTripsForDriver(activeDriver).flat();
  const g = groups.find(x => gKey(x) === key);
  if (!g) return '';

  const d = isDone(g);
  const allGroups = getTripsForDriver(activeDriver).flat();
  const doneCount = allGroups.filter(x=>isDone(x)).length;
  const pct = allGroups.length ? doneCount/allGroups.length*100 : 0;

  const totalW = g.orders.reduce((s,o)=>s+(o.weight||0),0);
  const totalPL = g.orders.reduce((s,o)=>s+(o.pl||0),0);
  const warnFlag = g.orders.some(o => (o.appt||'').toUpperCase().includes('CANCEL'));

  const mapUrl = 'https://maps.google.com/?q=' + encodeURIComponent(g.address);
  const phoneRaw = g.phone || '';
  const phone = phoneRaw && !/^[a-z]/i.test(phoneRaw) ? phoneRaw.replace(/[^0-9]/g,'') : null;

  const pickupDates = [...new Set(g.orders.map(o=>o.pickupDateTime).filter(Boolean))].join(', ');
  const skip = ['CONF RDY','NEED','OK','CONF','REQ','EMAIL REQ',''];
  const apptInfos = [...new Set(g.orders.map(o=>o.appt).filter(a=>a&&!skip.includes(a.toUpperCase().trim())))];

  const warnOrder = g.orders.find(o=>(o.appt||'').toUpperCase().includes('CANCEL'));
  const cashFlag2 = getCashFlag(g.shipper);
  const alertsHTML = (warnFlag
    ? '<div class="alert-banner alert-warn">&#9888; ' + (warnOrder ? warnOrder.appt : '') + ' &mdash; Verify before pickup</div>'
    : '')
    + (cashFlag2
    ? '<div class="alert-banner alert-cash">&#x1F4B5; ' + cashFlag2.message + '</div>'
    : '');
  const apptHTML = apptInfos.length
    ? '<div class="appt-block">&#128203; ' + apptInfos.join(' &middot; ') + '</div>'
    : '';

  const progressBar = forModal ? '' : '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div>';

  const ordersHtml = g.orders.map(function(o) {
    const tempCls = getTempClass(o);
    const chipsHTML = tempCls ? chip(tempCls, tempCls) : '';
    return '<div class="order-card">'
      + '<div>'
        + '<div class="order-customer">' + o.customer + '</div>'
        + (o.consignee && o.consignee !== o.customer ? '<div class="order-consignee">&rarr; ' + o.consignee + '</div>' : '')
        + '<div class="order-dest">&#9656; ' + o.delCity + ', ' + o.delSt + '</div>'
        + '<div class="order-meta">'
          + (o.po      ? '<div class="meta-field"><div class="meta-lbl">PO #</div><div class="meta-val">' + o.po      + '</div></div>' : '')
          + (o.bol     ? '<div class="meta-field"><div class="meta-lbl">BOL</div><div class="meta-val">'  + o.bol     + '</div></div>' : '')
          + (o.shipRef ? '<div class="meta-field"><div class="meta-lbl">Ref #</div><div class="meta-val">'+ o.shipRef + '</div></div>' : '')
        + '</div>'
        + (chipsHTML ? '<div class="order-chips">' + chipsHTML + '</div>' : '')
      + '</div>'
      + '<div class="order-right">'
        + '<div class="order-wt">' + fmtW(o.weight) + '</div>'
        + '<div class="order-pl">' + fmtPL(o.pl) + '</div>'
      + '</div>'
    + '</div>';
  }).join('');

  // Use global pvdToggleDone() — most reliable across iOS/Android WebKit
  const encodedKey = encodeURIComponent(key);
  const doneBtn = '<button class="btn ' + (d ? 'btn-undone' : 'btn-done') + '" onclick="pvdToggleDone(\'' + encodedKey + '\')" style="-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:44px;min-width:80px">'
    + (d ? '&#8617; Undo' : '&#10003; Done')
    + '</button>';

  const navBtn  = g.address ? '<a href="' + mapUrl + '" target="_blank" class="btn btn-nav" style="-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:44px">&#128205; Navigate</a>' : '';
  const callBtn = phone ? '<a href="tel:' + phone + '" class="btn btn-call" style="-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:44px">&#128222; Call</a>' : '';
  const phoneBlock = phone
    ? '<div class="phone-block"><div><div class="phone-lbl">Shipper Phone</div><div class="phone-num">' + g.phone + '</div></div><a href="tel:' + phone + '" class="btn btn-call">Call</a></div>'
    : '';

  return progressBar
    + '<div class="detail-hdr">'
      + '<div>'
        + '<div class="detail-stopnum">' + stopLabel(g.orders) + '</div>'
        + '<div class="detail-title">' + g.shipper + '</div>'
        + '<div class="detail-addr">' + g.address + '</div>'
      + '</div>'
      + '<div class="detail-actions">' + navBtn + callBtn + doneBtn + '</div>'
    + '</div>'
    + alertsHTML
    + apptHTML
    + '<div class="summary-bar">'
      + '<div class="sum-item"><div class="sum-lbl">Orders</div><div class="sum-val">' + g.orders.length + '</div></div>'
      + '<div class="sum-item"><div class="sum-lbl">Total Weight</div><div class="sum-val">' + fmtW(totalW) + '</div></div>'
      + '<div class="sum-item"><div class="sum-lbl">Total Pallets</div><div class="sum-val">' + (totalPL > 0 ? totalPL + ' PLT' : '&mdash;') + '</div></div>'
      + (pickupDates ? '<div class="sum-item"><div class="sum-lbl">Pickup Date &amp; Time</div><div class="sum-val">' + pickupDates + '</div></div>' : '')
    + '</div>'
    + phoneBlock
    + '<div class="section-lbl">Orders at this location (' + g.orders.length + ')</div>'
    + '<div class="orders-list">' + ordersHtml + '</div>';
}

// ── RENDER DETAIL (desktop panel) ──
function renderDetail(key) {
  const panel = document.getElementById('mainPanel');
  panel.innerHTML = buildDetailHTML(key, false);
}

// ── INTERACTIONS ──
function setDriver(id) {
  activeDriver = id;
  activeKey = null;
  history.replaceState(null, '', '#' + id);
  renderHeader();
  renderSidebar();
  showEmpty();
}

function isMobile() { return window.innerWidth <= 680; }

function selectStop(key) {
  activeKey = key;
  renderSidebar();
  if (isMobile()) {
    openModal(key);
  } else {
    renderDetail(key);
    document.getElementById('mainPanel').scrollTop = 0;
  }
}

function openModal(key) {
  const overlay = document.getElementById('modalOverlay');
  const inner = document.getElementById('modalInner');
  inner.innerHTML = buildDetailHTML(key);
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('modalSheet').scrollTop = 0;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// Global wrapper for inline onclick — needed for iOS/Android WebKit reliability
window.pvdToggleDone = function(encodedKey) {
  toggleDone(decodeURIComponent(encodedKey));
};

function toggleDone(key) {
  const groups = getStopsForDriver(activeDriver);
  const g = groups.find(x => gKey(x) === key);
  if (!g) return;

  const nowDone = isDone(g);
  const setTo = !nowDone;

  // Optimistic update locally
  g.orders.forEach(o => {
    if (setTo) done[o.stopVal] = true;
    else delete done[o.stopVal];
    // Write each stop to the sheet
    setDoneOnSheet(o.stopVal, setTo);
  });

  renderHeader();
  renderSidebar();
  if (activeKey === key) {
    if (isMobile()) {
      // Refresh modal content in place
      const inner = document.getElementById('modalInner');
      if (inner && document.getElementById('modalOverlay').classList.contains('open')) {
        inner.innerHTML = buildDetailHTML(key, true);
      }
    } else {
      renderDetail(key);
    }
  }
}

// ── UI STATES ──
function showEmpty() {
  document.getElementById('mainPanel').innerHTML = `<div class="empty-state"><img class="empty-logo" src="${document.getElementById('logoImg').src}" alt=""><div class="empty-txt">Select a stop</div></div>`;
}

function showLoading() {
  document.getElementById('mainPanel').innerHTML = `
    <div class="empty-state">
      <div style="width:52px;height:52px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:18px"></div>
      <div class="empty-txt" id="loadingMsg">Connecting to dispatch...</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:8px;letter-spacing:0.1em" id="loadingHint"></div>
    </div>`;
  document.getElementById('stopList').innerHTML = `<div style="padding:20px;color:var(--text3);font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-align:center">Loading...</div>`;

  // Cycle loading messages so the wait feels active
  const msgs = [
    ['Connecting to dispatch...', ''],
    ['Fetching route data...', 'This may take a few seconds on first load'],
    ['Loading stops...', 'Google is waking up the data server'],
    ['Almost there...', 'Hang tight'],
  ];
  let i = 0;
  window._loadingTimer = setInterval(function() {
    i = (i + 1) % msgs.length;
    const el = document.getElementById('loadingMsg');
    const hint = document.getElementById('loadingHint');
    if (el) el.textContent = msgs[i][0];
    if (hint) hint.textContent = msgs[i][1];
  }, 4000);
}

function showError(msg) {
  if (window._loadingTimer) { clearInterval(window._loadingTimer); window._loadingTimer = null; }
  document.getElementById('mainPanel').innerHTML = `
    <div class="empty-state">
      <div style="font-size:36px;opacity:0.4;margin-bottom:12px">⚠</div>
      <div class="empty-txt" style="color:var(--red)">Failed to load data</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:8px;max-width:300px;text-align:center">${msg}</div>
      <button class="btn btn-nav" style="margin-top:16px" onclick="loadData()">↺ Retry</button>
    </div>`;
}

// ── LOAD DATA ──
async function loadData() {
  showLoading();
  try {
    const resp = await fetch(APPS_SCRIPT_URL); // no cache-bust — allows Apps Script cache to serve fast
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    if (!json || (Array.isArray(json) && !json.length) || (!Array.isArray(json) && !json.rows)) throw new Error('Sheet returned no data');
    const responseRows = Array.isArray(json) ? json : (json.rows || []);
    CASH_FLAGS = Array.isArray(json) ? {} : (json.cashFlags || {});
    const parsed = parseRows(responseRows);
    if (!parsed.length) throw new Error('No stop data found. Keys: ' + (responseRows.length ? Object.keys(responseRows[0]).join(', ') : 'empty'));
    // Clear loading message timer
    if (window._loadingTimer) { clearInterval(window._loadingTimer); window._loadingTimer = null; }

    RAW = parsed;
    syncDone(responseRows);

    // Apply URL hash to jump to correct driver (e.g. #chn, #johnny)
    const hash = window.location.hash.replace('#','').toLowerCase().trim();
    if (hash && DRIVERS.find(d => d.id === hash)) {
      activeDriver = hash;
    }

    renderHeader();
    renderSidebar();
    showEmpty();
    lastDataHash = hashData(json);
    startPolling();
  } catch(e) {
    showError(e.message || 'Unknown error');
    console.error('Providence Dispatch load error:', e);
  }
}

// ── SPIN ANIMATION ──
const style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);


// ── PDF GENERATION (jsPDF) ──
function generatePDF() {
  const trips = getTripsForDriver(activeDriver);
  const allGroups = trips.flat();
  if (!allGroups.length) { alert('No stops to generate PDF for.'); return; }

  const btn = document.getElementById('pdfBtn');
  btn.classList.add('loading');
  btn.textContent = 'Generating...';

  setTimeout(function() {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'letter' });

      const PW = 612, PH = 792;
      const ML = 36, MR = 36, MT = 36, MB = 48;
      const CW = PW - ML - MR;
      const SKIP = ['CONF RDY','NEED','OK','CONF','REQ','EMAIL REQ',''];

      const driverDef = DRIVERS.find(d => d.id === activeDriver);
      const driverName = driverDef ? driverDef.name : activeDriver;
      const multiTrip = trips.length > 1;
      const totalW  = allGroups.reduce((s,g)=>s+g.orders.reduce((s2,o)=>s2+(o.weight||0),0),0);
      const totalPL = allGroups.reduce((s,g)=>s+g.orders.reduce((s2,o)=>s2+(o.pl||0),0),0);
      const today = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

      let y = MT;
      let pageNum = 1;

      // ── helpers ──
      function C(hex) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return [r,g,b];
      }
      function setFill(hex)   { const c=C(hex); doc.setFillColor(c[0],c[1],c[2]); }
      function setStroke(hex) { const c=C(hex); doc.setDrawColor(c[0],c[1],c[2]); }
      function setTxt(hex)    { const c=C(hex); doc.setTextColor(c[0],c[1],c[2]); }

      function drawPageFooter() {
        setStroke('#DDDDDD'); doc.setLineWidth(0.5);
        doc.line(ML, PH - MB + 8, PW - MR, PH - MB + 8);
        doc.setFontSize(7.5); doc.setFont('helvetica','normal'); setTxt('#999999');
        doc.text('Providence Freight Solutions — Confidential', ML, PH - MB + 18);
        doc.text('Page ' + pageNum, PW - MR, PH - MB + 18, {align:'right'});
      }

      function newPage() {
        drawPageFooter();
        doc.addPage(); pageNum++;
        y = MT;
        // Gold bar on continuation pages
        setFill('#E8A820'); doc.rect(ML, y, CW, 2, 'F');
        y += 10;
      }

      function need(h) { if (y + h > PH - MB - 10) newPage(); }

      function text(str, x, yy, opts) { doc.text(String(str||''), x, yy, opts||{}); }

      // ── DOCUMENT HEADER ──
      setFill('#E8A820'); doc.rect(ML, y, CW, 3, 'F');
      y += 12;

      doc.setFontSize(9); doc.setFont('helvetica','bold'); setTxt('#888888');
      text('PROVIDENCE FREIGHT SOLUTIONS', ML, y);
      y += 11;

      doc.setFontSize(20); doc.setFont('helvetica','bold'); setTxt('#141414');
      text(driverName.toUpperCase() + ' — ROUTE SHEET', ML, y);
      y += 14;

      doc.setFontSize(9); doc.setFont('helvetica','normal'); setTxt('#555555');
      text(today, ML, y);
      y += 10;

      doc.setFontSize(10); doc.setFont('helvetica','bold'); setTxt('#141414');
      const summaryLine = allGroups.length + ' stops  |  ' + totalW.toLocaleString() + ' lbs'
        + (totalPL > 0 ? '  |  ' + totalPL + ' PLT' : '')
        + (multiTrip ? '  |  ' + trips.length + ' trips' : '');
      text(summaryLine, ML, y);
      y += 8;

      setStroke('#E8A820'); doc.setLineWidth(1.5);
      doc.line(ML, y, PW - MR, y);
      y += 14;

      // ── TRIPS & STOPS ──
      trips.forEach(function(tripGroups, tripIdx) {

        // Trip / Route header bar
        const tripW  = tripGroups.reduce((s,g)=>s+g.orders.reduce((s2,o)=>s2+(o.weight||0),0),0);
        const tripPL = tripGroups.reduce((s,g)=>s+g.orders.reduce((s2,o)=>s2+(o.pl||0),0),0);
        need(22);
        setFill('#1E1E1E'); doc.rect(ML, y, CW, 18, 'F');
        doc.setFontSize(9); doc.setFont('helvetica','bold'); setTxt('#E8A820');
        const tripLabel = multiTrip ? 'TRIP ' + (tripIdx+1) : 'ROUTE';
        text(tripLabel, ML + 8, y + 12);
        doc.setFont('helvetica','normal'); setTxt('#AAAAAA');
        const tripMeta = tripGroups.length + ' stops  |  ' + tripW.toLocaleString() + ' lbs'
          + (tripPL > 0 ? '  |  ' + tripPL + ' PLT' : '');
        text(tripMeta, PW - MR - 8, y + 12, {align:'right'});
        y += 24;

        tripGroups.forEach(function(g) {
          const gW  = g.orders.reduce((s,o)=>s+(o.weight||0),0);
          const gPL = g.orders.reduce((s,o)=>s+(o.pl||0),0);
          const appts = [...new Set(g.orders.map(o=>o.appt).filter(a=>a&&!SKIP.includes(a.toUpperCase().trim())))];
          const pickups = [...new Set(g.orders.map(o=>o.pickupDateTime).filter(Boolean))];

          // Estimate height of this stop block
          const orderH = g.orders.reduce(function(s, o) {
            const fields = [o.po, o.bol, o.shipRef].filter(Boolean);
            return s + 14 + 10 + (fields.length > 0 ? Math.ceil(fields.length/3)*18 : 0) + 8;
          }, 0);
          const stopH = 22 + 12 + (g.phone ? 0 : 0) + (appts.length ? 14 : 0) + (pickups.length ? 12 : 0) + 6 + orderH + 12;
          need(Math.min(stopH, PH - MB - MT - 30));

          // Stop header
          setFill('#F0F0F0'); setStroke('#C8C8C8'); doc.setLineWidth(0.5);
          doc.rect(ML, y, CW, 20, 'FD');

          doc.setFontSize(7.5); doc.setFont('helvetica','bold'); setTxt('#888888');
          text(stopLabel(g.orders), ML + 6, y + 9);

          doc.setFontSize(12); doc.setFont('helvetica','bold'); setTxt('#141414');
          const shipLines = doc.splitTextToSize(g.shipper.toUpperCase(), CW - 120);
          text(shipLines[0], ML + 6, y + 17);

          doc.setFontSize(10); doc.setFont('helvetica','bold'); setTxt('#141414');
          if (gW > 0) text(gW.toLocaleString() + ' lbs', PW - MR - 6, y + 10, {align:'right'});
          if (gPL > 0) {
            doc.setFontSize(8); doc.setFont('helvetica','normal'); setTxt('#888888');
            text(gPL + ' PLT', PW - MR - 6, y + 19, {align:'right'});
          }
          y += 23;

          // Address + phone
          doc.setFontSize(8.5); doc.setFont('helvetica','normal'); setTxt('#444444');
          const addrPhone = g.address + (g.phone ? '   |   Tel: ' + g.phone : '');
          text(addrPhone, ML + 6, y, {maxWidth: CW - 10});
          y += 11;

          // Pickup date/time summary
          if (pickups.length) {
            doc.setFontSize(8.5); doc.setFont('helvetica','bold'); setTxt('#444444');
            text('Pickup: ' + pickups.join(', '), ML + 6, y);
            y += 11;
          }

          // Appointment
          if (appts.length) {
            setFill('#FFF8DC'); setStroke('#E8A820'); doc.setLineWidth(0.7);
            doc.rect(ML, y, CW, 13, 'FD');
            doc.setFontSize(8); doc.setFont('helvetica','bold'); setTxt('#7A5500');
            text('APPT: ' + appts.join('  |  '), ML + 6, y + 9);
            y += 15;
          }

          y += 3;

          // Orders
          g.orders.forEach(function(o, oIdx) {
            const fields = [];
            if (o.po)      fields.push(['PO #',   o.po]);
            if (o.bol)     fields.push(['BOL',    o.bol]);
            if (o.shipRef) fields.push(['REF #',  o.shipRef]);
            const fieldRows = fields.length > 0 ? Math.ceil(fields.length/3) : 0;
            const oH = 13 + 10 + (fieldRows * 18) + 8;
            need(oH);

            if (oIdx > 0) {
              setStroke('#E0E0E0'); doc.setLineWidth(0.3);
              doc.line(ML + 6, y, PW - MR - 6, y);
              y += 6;
            }

            // Customer
            doc.setFontSize(11); doc.setFont('helvetica','bold'); setTxt('#141414');
            text(o.customer.toUpperCase(), ML + 8, y);
            y += 12;

            // Destination
            doc.setFontSize(8.5); doc.setFont('helvetica','normal'); setTxt('#555555');
            const dest = (o.consignee && o.consignee !== o.customer)
              ? o.consignee + '  >  ' + o.delCity + ', ' + o.delSt
              : o.delCity + ', ' + o.delSt;
            text(dest, ML + 8, y, {maxWidth: CW - 16});
            y += 11;

            // Fields grid (PO / BOL / REF only)
            if (fields.length > 0) {
              const colW = CW / 3;
              for (let row = 0; row < fieldRows; row++) {
                for (let col = 0; col < 3; col++) {
                  const fi = row * 3 + col;
                  if (fi >= fields.length) continue;
                  const fx = ML + 8 + col * colW;
                  doc.setFontSize(7); doc.setFont('helvetica','bold'); setTxt('#888888');
                  text(fields[fi][0], fx, y);
                  doc.setFontSize(10); doc.setFont('helvetica','bold'); setTxt('#141414');
                  text(fields[fi][1], fx, y + 10, {maxWidth: colW - 10});
                }
                y += 18;
              }
            }
            y += 4;
          });

          // Stop bottom rule
          setStroke('#CCCCCC'); doc.setLineWidth(0.8);
          doc.line(ML, y, PW - MR, y);
          y += 12;
        });
      });

      drawPageFooter();
      doc.save('Providence_' + driverName + '_Route.pdf');

    } catch(err) {
      alert('PDF generation failed: ' + err.message);
      console.error('PDF error:', err);
    }

    btn.classList.remove('loading');
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PDF';
  }, 50);
}

// ── INIT ──
loadData();

</script>
